name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release (e.g. v0.1.0)
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        id: package
        shell: bash
        run: |
          BIN=fucina
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          VERSION="${TAG#v}"
          DIR="${BIN}-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/$DIR"
          cp "target/${{ matrix.target }}/release/$BIN" "dist/$DIR/"
          cp README.md LICENSE* dist/"$DIR"/ 2>/dev/null || true
          cd dist
          tar czf "${DIR}.tar.gz" "$DIR"
          shasum -a 256 "${DIR}.tar.gz" > "${DIR}.tar.gz.sha256"
          echo "archive=${DIR}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=${DIR}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/${{ steps.package.outputs.archive }}
            dist/${{ steps.package.outputs.checksum }}
          retention-days: 7

  pkg:
    name: macOS .pkg (signed + notarized + stapled)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          key: pkg-arm64

      - name: Install toolchain targets
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Build universal binary
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          mkdir -p target/release
          lipo -create -output target/release/fucina \
            target/aarch64-apple-darwin/release/fucina \
            target/x86_64-apple-darwin/release/fucina
          lipo -info target/release/fucina

      - name: Import signing certificates
        env:
          APPLE_DEVID_APPLICATION_P12: ${{ secrets.APPLE_DEVID_APPLICATION_P12 }}
          APPLE_DEVID_APPLICATION_PASSWORD: ${{ secrets.APPLE_DEVID_APPLICATION_PASSWORD }}
          APPLE_DEVID_INSTALLER_P12: ${{ secrets.APPLE_DEVID_INSTALLER_P12 }}
          APPLE_DEVID_INSTALLER_PASSWORD: ${{ secrets.APPLE_DEVID_INSTALLER_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/fucina.keychain-db"
          KEYCHAIN_PW="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          OLD_KEYCHAINS=$(security list-keychains -d user | sed 's/"//g')
          security list-keychains -d user -s "$KEYCHAIN" $OLD_KEYCHAINS
          # Trim whitespace/newlines that GitHub may add to secret values
          printf '%s' "$APPLE_DEVID_APPLICATION_P12" | tr -d '[:space:]' | base64 -D -o "$RUNNER_TEMP/app.p12"
          printf '%s' "$APPLE_DEVID_INSTALLER_P12"   | tr -d '[:space:]' | base64 -D -o "$RUNNER_TEMP/inst.p12"
          file "$RUNNER_TEMP/app.p12" "$RUNNER_TEMP/inst.p12"
          security import "$RUNNER_TEMP/app.p12"  -k "$KEYCHAIN" -P "$APPLE_DEVID_APPLICATION_PASSWORD" -T /usr/bin/codesign -T /usr/bin/pkgbuild -T /usr/bin/productbuild
          security import "$RUNNER_TEMP/inst.p12" -k "$KEYCHAIN" -P "$APPLE_DEVID_INSTALLER_PASSWORD"   -T /usr/bin/codesign -T /usr/bin/pkgbuild -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign:,pkgbuild:,productbuild: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          rm "$RUNNER_TEMP/app.p12" "$RUNNER_TEMP/inst.p12"
          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Store notarytool credentials
        env:
          APPLE_ID_EMAIL: ${{ secrets.APPLE_ID_EMAIL }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials FUCINA_NOTARY \
            --apple-id "$APPLE_ID_EMAIL" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Build + sign + notarize + staple pkg
        run: |
          # Makefile's `pkg` target depends on `release` which re-runs cargo;
          # skip it since we already built the universal binary.
          touch target/release/fucina
          make pkg

      - name: Upload pkg
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: |
            target/fucina-*.pkg
          retention-days: 7

  release:
    name: Publish release
    needs: [build, pkg]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten
        run: find dist -mindepth 2 -type f -exec mv {} dist/ \;

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.pkg
